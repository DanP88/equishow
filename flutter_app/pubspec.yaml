name: equishow
description: Equishow — App compagnon du cavalier de concours équestre
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # ── State management ────────────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ── Navigation ──────────────────────────────────────────────
  go_router: ^13.2.0

  # ── HTTP / API ───────────────────────────────────────────────
  dio: ^5.4.3

  # ── Local storage ───────────────────────────────────────────
  shared_preferences: ^2.2.3

  # ── UI helpers ──────────────────────────────────────────────
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1

  # ── Utils ───────────────────────────────────────────────────
  intl: ^0.19.0
  url_launcher: ^6.2.6
  equatable: ^2.0.5
  supabase_flutter: ^2.12.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
